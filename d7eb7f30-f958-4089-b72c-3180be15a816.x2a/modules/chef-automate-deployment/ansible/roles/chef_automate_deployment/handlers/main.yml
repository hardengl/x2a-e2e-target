---
- name: Restart Chef Automate
  ansible.builtin.command:
    cmd: chef-automate restart
    chdir: "{{ chef_automate_cli_path }}"
  become: true
  register: restart_automate
  changed_when: restart_automate.rc == 0
- name: Restart Chef Server
  ansible.builtin.command:
    cmd: chef-server-ctl restart
    chdir: "{{ chef_automate_cli_path }}"
  become: true
  register: restart_server
  changed_when: restart_server.rc == 0
