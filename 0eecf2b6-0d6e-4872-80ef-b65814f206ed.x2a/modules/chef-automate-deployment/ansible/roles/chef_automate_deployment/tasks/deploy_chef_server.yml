---
- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ chef_automate_hostname }}"
  become: true
- name: Set vm.max_map_count kernel parameter
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    sysctl_set: true
    reload: true
  become: true
  collections:
    - ansible.posix
- name: Set vm.dirty_expire_centisecs kernel parameter
  ansible.posix.sysctl:
    name: vm.dirty_expire_centisecs
    value: "20000"
    state: present
    sysctl_set: true
    reload: true
  become: true
  collections:
    - ansible.posix
- name: Download Chef Automate CLI
  ansible.builtin.get_url:
    url: https://packages.chef.io/files/current/latest/chef-automate-cli/chef-automate_linux_amd64.zip
    dest: /tmp/chef-automate_linux_amd64.zip
    mode: "0644"
  become: true
- name: Unzip Chef Automate CLI
  ansible.builtin.shell:
    cmd: gunzip - > chef-automate
    stdin: "{{ lookup('file', '/tmp/chef-automate_linux_amd64.zip') }}"
    chdir: /tmp
    creates: /tmp/chef-automate
  become: true
- name: Make Chef Automate CLI executable
  ansible.builtin.file:
    path: /tmp/chef-automate
    mode: "0755"
  become: true
- name: Deploy Chef Infra Server
  ansible.builtin.command:
    cmd: /tmp/chef-automate deploy --product infra-server --accept-terms-and-mlsa=true
    creates: /etc/chef-server
  become: true
- name: Create Chef user
  ansible.builtin.command:
    cmd: 'chef-server-ctl user-create {{ chef_automate_username }}  {{ chef_automate_longusername }} {{ chef_automate_useremail }}  "{{ chef_automate_userpassword
      }}" --filename {{ chef_automate_userfilename }}

      '
    creates: "{{ chef_automate_userfilename }}"
  become: true
- name: Create Chef organization
  ansible.builtin.command:
    cmd: 'chef-server-ctl org-create {{ chef_automate_orgname }}  "{{ chef_automate_longorgname }}" --association_user {{ chef_automate_username }}  --filename {{
      chef_automate_orgfilename }}

      '
    creates: "{{ chef_automate_orgfilename }}"
  become: true
